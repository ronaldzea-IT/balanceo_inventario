{% extends "base.html" %}
{% block heading %}Stock Actual{% endblock %}

{% block content %}
<style>
.toolbar { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.toolbar input[type=text] {
  flex: 2; min-width: 200px; padding: 10px 16px;
  border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 0.9rem; outline: none;
}
.toolbar input[type=text]:focus { border-color: #2E75B6; }
.btn-accion {
  padding: 10px 16px; background: #2E75B6; color: white;
  border: none; border-radius: 8px; font-size: 0.85rem;
  cursor: pointer; white-space: nowrap;
}
.btn-accion:hover { background: #1F4E79; }
.btn-excel { background: #375623; }
.btn-excel:hover { background: #1E3A0F; }
.badge-ext { background: #C55A11; color: white; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-left: 4px; }

.dd-wrap { position: relative; }
.dd-btn {
  padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 0.85rem; background: white; cursor: pointer;
  white-space: nowrap; min-width: 180px; text-align: left;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.dd-btn:hover { border-color: #2E75B6; }
.dd-btn.active { border-color: #2E75B6; }
.dd-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.dd-btn .arrow { font-size: 0.7rem; color: #999; }
.dd-list {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: white; border: 2px solid #2E75B6; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 999;
  min-width: 240px; max-height: 280px; overflow-y: auto;
}
.dd-list.open { display: block; }
.dd-search { padding: 8px 10px; border-bottom: 1px solid #eee; }
.dd-search input { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.82rem; outline: none; box-sizing: border-box; }
.dd-actions { display: flex; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #eee; }
.dd-actions span { font-size: 0.75rem; color: #2E75B6; cursor: pointer; text-decoration: underline; }
.dd-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 0.83rem; }
.dd-item:hover { background: #f0f7ff; }
.dd-item input[type=checkbox] { cursor: pointer; accent-color: #2E75B6; flex-shrink: 0; }
.dd-item-single { cursor: pointer; }
.dd-item-single.selected { background: #EBF3FB; color: #1F4E79; font-weight: 600; }

.toolbar-prov { margin-bottom: 16px; }
.dd-wrap-ancho { width: 100%; }
.dd-btn-ancho { width: 100%; min-width: 100%; }
.dd-list-ancho { width: 100%; min-width: 100%; max-height: 360px; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi { background: white; border-radius: 8px; padding: 14px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #2E75B6; }
.kpi.verde   { border-left-color: #375623; }
.kpi.naranja { border-left-color: #C55A11; }
.kpi.rojo    { border-left-color: #C00000; }
.kpi-label { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-valor { font-size: 1.4rem; font-weight: 700; color: #1F4E79; margin-top: 4px; }

table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 0.83rem; }
thead th { background: #1F4E79; color: white; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; }
thead th.right { text-align: right; }
thead th.center { text-align: center; }
tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.1s; }
tbody tr:hover { background: #f8fbff; }
tbody tr.sin-stock td { color: #bbb; }
tbody td { padding: 9px 12px; }
tbody td.right { text-align: right; }
.cod { font-weight: 700; color: #1F4E79; }
.suc-badge { background: #1F4E79; color: white; padding: 2px 7px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
.stock-pos { color: #375623; font-weight: 700; }
.stock-cero { color: #bbb; }
.col-resaltada { background: #FFF6D9 !important; }
th.col-resaltada { background: #C55A11 !important; }
tr.fila-resaltada td { background: #E8F0FE !important; }
tr.fila-resaltada td.col-resaltada { background: #FFE9A8 !important; }
tr.fila-resaltada:hover td { background: #DCE7FB !important; }

.paginador { display: flex; align-items: center; justify-content: space-between; padding: 8px 4px; margin: 8px 0; font-size: 0.82rem; color: #666; }
.pag-info { color: #888; }
.pag-select { padding: 6px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.82rem; outline: none; background: white; cursor: pointer; }
.pag-select:focus { border-color: #2E75B6; }

.estado-area { background: white; border-radius: 10px; padding: 48px; text-align: center; color: #bbb; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 2px dashed #e0e0e0; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #c8e0f5; border-top-color: #2E75B6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 40px; color: #2E75B6; }
</style>

<!-- Toolbar fila 1 -->
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Buscar SKU o descripcion..." oninput="filtrar()">

  <div class="dd-wrap" id="wrapSuc">
    <button class="dd-btn" id="btnSuc" onclick="toggleDD('Suc')">
      <span id="lblSuc">Todas las sucursales</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list" id="listSuc">
      <div class="dd-search"><input type="text" id="searchSuc" placeholder="Buscar sucursal..." oninput="filtrarDD('Suc')"></div>
      <div class="dd-actions"><span onclick="selTodos('Suc')">Todos</span><span onclick="deselTodos('Suc')">Ninguno</span></div>
      <div id="itemsSuc"></div>
    </div>
  </div>

  <button class="btn-accion" onclick="cargar()">&#x21BB; Recargar</button>
  <label class="btn-accion btn-excel" for="fileStockExt" style="display:inline-block;cursor:pointer;" title="Cargar stock desde Excel externo">&#x1F4C2; Cargar Stock Excel</label>
  <input type="file" id="fileStockExt" accept=".xlsx" style="display:none" onchange="cargarStockExterno(this)">
  <span id="lblFechaExt" style="font-size:0.78rem;color:#888;"></span>
</div>

<!-- Toolbar fila 2: Proveedor (ancho completo, seleccion unica) -->
<div class="toolbar-prov">
  <div class="dd-wrap dd-wrap-ancho" id="wrapProv">
    <button class="dd-btn dd-btn-ancho" id="btnProv" onclick="toggleDD('Prov')">
      <span id="lblProv">Todos los proveedores</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list dd-list-ancho" id="listProv">
      <div class="dd-search"><input type="text" id="searchProv" placeholder="Buscar proveedor..."></div>
      <div id="itemsProv"></div>
    </div>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-row" id="kpiRow" style="display:none;">
  <div class="kpi"><div class="kpi-label">SKUs</div><div class="kpi-valor" id="kpiSkus">-</div></div>
  <div class="kpi verde"><div class="kpi-label">Existencia Total</div><div class="kpi-valor" id="kpiExist">-</div></div>
  <div class="kpi naranja"><div class="kpi-label">En Transito</div><div class="kpi-valor" id="kpiTrans">-</div></div>
  <div class="kpi"><div class="kpi-label">Stock Disponible</div><div class="kpi-valor" id="kpiDisp">-</div></div>
  <div class="kpi rojo"><div class="kpi-label">Costo Inventario</div><div class="kpi-valor" id="kpiCosto">-</div></div>
</div>

<div id="contenido"><div class="loading"><div class="spinner"></div><br>Cargando stock...</div></div>

<script>
let todosLosDatos = [];
let datosFiltrados = [];
let paginaActual = 1;
let POR_PAGINA = 100;
let proveedoresList = [];
let stockExterno = [];
let mapaNombresProv = {};
let provSeleccionado = "";

const selSuc = new Set();
const todosSuc = [];
const labels = { Suc: ["Todas las sucursales", "sucursales"] };

// ---- Dropdown generico ----
function toggleDD(key) {
  ["Suc","Prov"].forEach(k => {
    if (k !== key) {
      document.getElementById("list"+k).classList.remove("open");
      document.getElementById("btn"+k).classList.remove("active");
    }
  });
  document.getElementById("list"+key).classList.toggle("open");
  document.getElementById("btn"+key).classList.toggle("active");
}

document.addEventListener("click", function(e) {
  ["Suc","Prov"].forEach(k => {
    const wrap = document.getElementById("wrap"+k);
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById("list"+k).classList.remove("open");
      document.getElementById("btn"+k).classList.remove("active");
    }
  });
});

// ---- Sucursales ----
let todasLasSucursalesBD = [];
async function poblarSuc(data) {
  if (todasLasSucursalesBD.length === 0) {
    try {
      const r = await fetch("/api/sucursales");
      const lista = await r.json();
      todasLasSucursalesBD = lista.map(s => s.codigo).sort();
    } catch(e) { todasLasSucursalesBD = [...new Set(data.map(d => d.sucursal))].sort(); }
  }
  const sucs = todasLasSucursalesBD;
  todosSuc.length = 0;
  sucs.forEach(s => todosSuc.push(s));
  sucs.forEach(s => {
    const v = localStorage.getItem("suc_activa_" + s);
    if (v === null || v === "1") selSuc.add(s); else selSuc.delete(s);
  });
  actualizarLabelSuc();
  renderSuc();
}

function renderSuc() {
  const q = (document.getElementById("searchSuc").value || "").toLowerCase();
  const lista = todosSuc.filter(s => s.toLowerCase().includes(q));
  const cont = document.getElementById("itemsSuc");
  cont.innerHTML = "";
  lista.forEach(s => {
    const div = document.createElement("div");
    div.className = "dd-item";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = selSuc.has(s);
    const span = document.createElement("span");
    span.textContent = s;
    div.appendChild(cb);
    div.appendChild(span);
    cb.addEventListener("change", function() {
      if (this.checked) selSuc.add(s); else selSuc.delete(s);
      actualizarLabelSuc(); filtrar();
    });
    div.addEventListener("click", function(e) { if (e.target !== cb) cb.click(); });
    cont.appendChild(div);
  });
}

function filtrarDD(key) {
  if (key === "Suc") renderSuc();
}

function selTodos(key) {
  if (key === "Suc") { todosSuc.forEach(s => selSuc.add(s)); actualizarLabelSuc(); renderSuc(); filtrar(); }
}

function deselTodos(key) {
  if (key === "Suc") { selSuc.clear(); actualizarLabelSuc(); renderSuc(); filtrar(); }
}

function actualizarLabelSuc() {
  const lbl = document.getElementById("lblSuc");
  const n = selSuc.size, total = todosSuc.length;
  if (n === 0)      lbl.textContent = "Sin sucursales";
  else if (n===total) lbl.textContent = "Todas las sucursales";
  else if (n === 1) lbl.textContent = [...selSuc][0];
  else              lbl.textContent = n + " sucursales";
}

// ---- Proveedores (seleccion unica) ----
async function poblarProv() {
  try {
    const res = await fetch("/api/proveedores/lista");
    proveedoresList = await res.json();
  } catch(e) { proveedoresList = []; }
  mapaNombresProv = {};
  proveedoresList.forEach(p => { mapaNombresProv[p.codigo] = p.nombre; });

  // Leer proveedor activo desde localStorage
  const activos = Object.keys(localStorage)
    .filter(k => k.startsWith("prov_activo_") && localStorage.getItem(k) === "1")
    .map(k => k.replace("prov_activo_", ""));
  provSeleccionado = activos.length > 0 ? activos[0] : "";
  actualizarLabelProv();
  renderProv();

  document.getElementById("searchProv").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    document.getElementById("itemsProv").querySelectorAll(".dd-item-single").forEach(el => {
      el.style.display = el.textContent.toLowerCase().includes(q) ? "" : "none";
    });
  });
}

function renderProv() {
  const cont = document.getElementById("itemsProv");
  cont.innerHTML = "";
  const divTodos = document.createElement("div");
  divTodos.className = "dd-item dd-item-single" + (provSeleccionado === "" ? " selected" : "");
  divTodos.textContent = "Todos los proveedores";
  divTodos.addEventListener("click", function() {
    provSeleccionado = "";
    actualizarLabelProv(); renderProv(); cargar();
    document.getElementById("listProv").classList.remove("open");
    document.getElementById("btnProv").classList.remove("active");
  });
  cont.appendChild(divTodos);

  proveedoresList.forEach(p => {
    const div = document.createElement("div");
    div.className = "dd-item dd-item-single" + (provSeleccionado === p.codigo ? " selected" : "");
    div.textContent = p.codigo + " - " + p.nombre;
    div.addEventListener("click", function() {
      provSeleccionado = p.codigo;
      actualizarLabelProv(); renderProv(); cargar();
      document.getElementById("listProv").classList.remove("open");
      document.getElementById("btnProv").classList.remove("active");
    });
    cont.appendChild(div);
  });
}

function actualizarLabelProv() {
  const lbl = document.getElementById("lblProv");
  if (!provSeleccionado) { lbl.textContent = "Todos los proveedores"; return; }
  const nombre = mapaNombresProv[provSeleccionado];
  lbl.textContent = nombre ? (provSeleccionado + " - " + nombre) : provSeleccionado;
}

// ---- Carga ----
async function cargar() {
  document.getElementById("contenido").innerHTML = "<div class='loading'><div class='spinner'></div><br>Cargando stock...</div>";
  document.getElementById("kpiRow").style.display = "none";

  // Cargar desde BD
  const url = "/api/stock" + (provSeleccionado ? "?co_prov=" + encodeURIComponent(provSeleccionado) : "");
  const res  = await fetch(url);
  const datosBD = await res.json();

  // Cargar cache externo
  const resExt = await fetch("/api/stock/externo");
  const dataExt = await resExt.json();
  if (dataExt.ok) {
    stockExterno = dataExt.registros;
    const fecha = dataExt.fecha;
    document.getElementById("lblFechaExt").textContent = fecha ? "Excel: " + fecha : "";
  }

  // Filtrar externos por proveedor si aplica
  let externosFiltrados = stockExterno;
  if (provSeleccionado) {
    externosFiltrados = stockExterno.filter(d => d.co_prov === provSeleccionado);
  }

  // Marcar fuente y mezclar
  datosBD.forEach(d => d.fuente = "bd");
  todosLosDatos = [...datosBD, ...externosFiltrados];

  await poblarSuc(todosLosDatos);
  filtrar();
  document.getElementById("kpiRow").style.display = "grid";
}

async function cargarStockExterno(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = "";
  document.getElementById("contenido").innerHTML = "<div class='loading'><div class='spinner'></div><br>Procesando Excel...</div>";
  const formData = new FormData();
  formData.append("archivo", file);
  const res  = await fetch("/api/stock/cargar-externo", { method: "POST", body: formData });
  const data = await res.json();
  if (!data.ok) {
    alert("Error: " + data.error);
    return;
  }
  await cargar();
}

// ---- Filtrar ----
function filtrar() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  datosFiltrados = todosLosDatos.filter(d =>
    selSuc.has(d.sucursal) &&
    (d.sku + d.descripcion).toLowerCase().includes(q)
  );
  paginaActual = 1;
  actualizarKPIs();
  renderTabla();
}

function actualizarKPIs() {
  document.getElementById("kpiSkus").textContent    = datosFiltrados.length.toLocaleString();
  document.getElementById("kpiExist").textContent   = datosFiltrados.reduce((a,d) => a+d.existencia, 0).toLocaleString();
  document.getElementById("kpiTrans").textContent   = datosFiltrados.reduce((a,d) => a+d.transito, 0).toLocaleString();
  document.getElementById("kpiDisp").textContent    = datosFiltrados.reduce((a,d) => a+d.stock_disp, 0).toLocaleString();
  document.getElementById("kpiCosto").textContent   = datosFiltrados.reduce((a,d) => a+d.costo_inv, 0).toLocaleString();
}

let sortCol = "";
let sortAsc = true;
let colResaltada = "";
let filaResaltada = -1;

function sortByStock(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  colResaltada = col;
  paginaActual = 1;
  renderTabla();
}
function sortIconStock(col) {
  if (sortCol !== col) return " &#8597;";
  return sortAsc ? " &#8593;" : " &#8595;";
}
function toggleFilaStock(idx) {
  filaResaltada = (filaResaltada === idx) ? -1 : idx;
  renderTabla();
}

function renderTabla() {
  const contenido = document.getElementById("contenido");
  if (!datosFiltrados.length) {
    contenido.innerHTML = "<div class='estado-area'><p>No hay registros con los filtros aplicados</p></div>";
    return;
  }

  if (sortCol) {
    datosFiltrados.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") va = va.toLowerCase();
      if (typeof vb === "string") vb = vb.toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  const totalPags = Math.ceil(datosFiltrados.length / POR_PAGINA);
  if (paginaActual > totalPags) paginaActual = totalPags;
  const inicio = (paginaActual - 1) * POR_PAGINA;
  const pagina = datosFiltrados.slice(inicio, inicio + POR_PAGINA);

  let opciones = "";
  for (let i = 1; i <= totalPags; i++)
    opciones += "<option value='" + i + "'" + (i===paginaActual?" selected":"") + ">Pag " + i + " de " + totalPags + "</option>";

  const selectorTam = "<select class='pag-select' onchange='cambiarTam(this.value)' style='margin-left:8px;'>" +
    [25,50,100].map(n => "<option value='" + n + "'" + (n===POR_PAGINA?" selected":"") + ">" + n + " / pag</option>").join("") +
    "</select>";

  const paginador = "<div class='paginador'>" +
    "<span class='pag-info'>" + datosFiltrados.length.toLocaleString() + " registros &nbsp;|&nbsp; mostrando " + (inicio+1) + " - " + Math.min(inicio+POR_PAGINA, datosFiltrados.length) + "</span>" +
    "<div style='display:flex;gap:8px;align-items:center;'>" + selectorTam +
    "<select class='pag-select' onchange='irPagina(this.value)'>" + opciones + "</select></div></div>";

  const colCls = function(col) { return colResaltada === col ? " col-resaltada" : ""; };

  let filas = pagina.map((d, i) => {
    const idxGlobal = inicio + i;
    const filaCls = filaResaltada === idxGlobal ? " fila-resaltada" : "";
    return "<tr class='" + ((d.stock_disp <= 0 ? "sin-stock " : "") + filaCls).trim() + "' onclick=\"toggleFilaStock(" + idxGlobal + ")\" style='cursor:pointer'>" +
    "<td class='cod" + colCls("sku") + "'>" + d.sku + (d.fuente==='excel' ? "<span class='badge-ext'>EXT</span>" : "") + "</td>" +
    "<td class='" + colCls("descripcion").trim() + "'>" + d.descripcion + "</td>" +
    "<td class='" + colCls("sucursal").trim() + "'><span class='suc-badge'>" + d.sucursal + "</span></td>" +
    "<td class='right " + (d.existencia > 0 ? "stock-pos" : "stock-cero") + colCls("existencia") + "'>" + d.existencia.toLocaleString() + "</td>" +
    "<td class='right" + colCls("transito") + "'>" + d.transito.toLocaleString() + "</td>" +
    "<td class='right" + colCls("comprometido") + "'>" + d.comprometido.toLocaleString() + "</td>" +
    "<td class='right " + (d.stock_disp > 0 ? "stock-pos" : "stock-cero") + colCls("stock_disp") + "'>" + d.stock_disp.toLocaleString() + "</td>" +
    "<td class='right" + colCls("costo_inv") + "'>" + d.costo_inv.toLocaleString() + "</td>" +
    "</tr>";
  }).join("");

  const encCols = [
    ["sku","SKU",""], ["descripcion","Descripcion",""], ["sucursal","Sucursal",""],
    ["existencia","Existencia","right"], ["transito","En Transito","right"],
    ["comprometido","Comprometido","right"], ["stock_disp","Stock Disp.","right"],
    ["costo_inv","Costo Inv.","right"]
  ];
  let thHtml = "";
  encCols.forEach(function(c) {
    const col = c[0], label = c[1], extra = c[2];
    const clase = (extra + colCls(col)).trim();
    const claseAttr = clase ? " class='" + clase + "'" : "";
    thHtml += "<th" + claseAttr + " onclick='sortByStock(&quot;" + col + "&quot;)' style='cursor:pointer'>" + label + sortIconStock(col) + "</th>";
  });

  contenido.innerHTML = paginador +
    "<table><thead><tr>" + thHtml + "</tr></thead><tbody>" + filas + "</tbody></table>" + paginador;
}

function irPagina(p) {
  paginaActual = parseInt(p);
  renderTabla();
  document.getElementById("contenido").scrollIntoView({ behavior: "smooth", block: "start" });
}

function cambiarTam(n) {
  POR_PAGINA = parseInt(n);
  paginaActual = 1;
  renderTabla();
}

async function init() {
  await poblarProv();
  // Leer proveedor activo desde localStorage (igual que ventas)
  const activos = Object.keys(localStorage)
    .filter(k => k.startsWith("prov_activo_") && localStorage.getItem(k) === "1")
    .map(k => k.replace("prov_activo_", ""));
  if (activos.length > 0) {
    provSeleccionado = activos[0];
    actualizarLabelProv();
    renderProv();
  }
  await cargar();
}

window.onload = init;
</script>
{% endblock %}
