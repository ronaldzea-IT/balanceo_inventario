{% extends "base.html" %}
{% block heading %}Ventas{% endblock %}

{% block content %}
<style>
.toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
.toolbar input[type=text] {
  flex: 2; min-width: 200px; padding: 10px 16px;
  border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 0.9rem; outline: none;
}
.toolbar input[type=text]:focus { border-color: #2E75B6; }
.btn-accion {
  padding: 10px 16px; background: #2E75B6; color: white;
  border: none; border-radius: 8px; font-size: 0.85rem;
  cursor: pointer; white-space: nowrap;
}
.btn-accion:hover { background: #1F4E79; }
.btn-excel { background: #375623; }
.btn-excel:hover { background: #1E3A0F; }

.toolbar-prov { margin-bottom: 20px; }
.dd-wrap-ancho { width: 100%; }
.dd-btn-ancho { width: 100%; min-width: 100%; }
.dd-list-ancho { width: 100%; min-width: 100%; max-height: 360px; }

.dd-wrap { position: relative; }
.dd-btn {
  padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 0.85rem; background: white; cursor: pointer;
  white-space: nowrap; min-width: 180px; text-align: left;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.dd-btn:hover { border-color: #2E75B6; }
.dd-btn.active { border-color: #2E75B6; }
.dd-btn .arrow { font-size: 0.7rem; color: #999; }
.dd-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.dd-list {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: white; border: 2px solid #2E75B6; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 999;
  min-width: 240px; max-height: 280px; overflow-y: auto;
}
.dd-list.open { display: block; }
.dd-search { padding: 8px 10px; border-bottom: 1px solid #eee; }
.dd-search input {
  width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 0.82rem; outline: none; box-sizing: border-box;
}
.dd-actions { display: flex; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #eee; }
.dd-actions span { font-size: 0.75rem; color: #2E75B6; cursor: pointer; text-decoration: underline; }
.dd-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 0.83rem; }
.dd-item:hover { background: #f0f7ff; }
.dd-item input[type=checkbox] { cursor: pointer; accent-color: #2E75B6; flex-shrink: 0; }
.dd-item-single { cursor: pointer; }
.dd-item-single.selected { background: #EBF3FB; color: #1F4E79; font-weight: 600; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi {
  background: white; border-radius: 12px; padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(31,78,121,0.06);
  border: 1px solid #eef1f5; position: relative; overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
  display: flex; align-items: center; gap: 14px;
}
.kpi:hover { box-shadow: 0 6px 16px rgba(31,78,121,0.12); transform: translateY(-2px); }
.kpi-icono {
  width: 42px; height: 42px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0; background: #EBF3FB; color: #2E75B6;
}
.kpi.verde .kpi-icono   { background: #E2EFDA; color: #375623; }
.kpi.naranja .kpi-icono { background: #FCE4D6; color: #C55A11; }
.kpi-texto { min-width: 0; }
.kpi-label { font-size: 0.68rem; color: #98a2b3; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
.kpi-valor { font-size: 1.5rem; font-weight: 700; color: #1F4E79; margin-top: 2px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.periodo { font-size: 0.8rem; color: #666; margin-bottom: 10px; }

table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 0.83rem; }
thead th { background: #1F4E79; color: white; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { background: #2E75B6; }
thead th.right { text-align: right; }
tbody tr { border-bottom: 1px solid #f5f5f5; transition: background 0.1s; }
tbody tr:hover { background: #f8fbff; }
tbody td { padding: 9px 12px; }
tbody td.right { text-align: right; }
.cod { font-weight: 700; color: #1F4E79; }
.suc-badge { background: #1F4E79; color: white; padding: 2px 7px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
.mes-badge { background: #EBF3FB; color: #1F4E79; padding: 2px 7px; border-radius: 4px; font-size: 0.75rem; }
.dev { color: #C00000; }
.col-resaltada { background: #FFF6D9 !important; }
th.col-resaltada { background: #C55A11 !important; }
tr.fila-resaltada td { background: #E8F0FE !important; }
tr.fila-resaltada td.col-resaltada { background: #FFE9A8 !important; }
tr.fila-resaltada:hover td { background: #DCE7FB !important; }
.estado-area { background: white; border-radius: 10px; padding: 48px; text-align: center; color: #bbb; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 2px dashed #e0e0e0; }

.paginador {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 4px; margin: 8px 0; font-size: 0.82rem; color: #666;
}
.pag-info { color: #888; }
.pag-select {
  padding: 6px 12px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 0.82rem; outline: none; background: white; cursor: pointer;
}
.pag-select:focus { border-color: #2E75B6; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #c8e0f5; border-top-color: #2E75B6; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 40px; color: #2E75B6; }
</style>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Buscar SKU o descripcion..." oninput="filtrar()" disabled>

  <div class="dd-wrap" id="wrapSuc">
    <button class="dd-btn" id="btnSuc" onclick="toggleDD('Suc')" disabled>
      <span id="lblSuc">Todas las sucursales</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list" id="listSuc">
      <div class="dd-search"><input type="text" id="searchSuc" placeholder="Buscar sucursal..." oninput="filtrarDD('Suc')"></div>
      <div class="dd-actions"><span onclick="selTodos('Suc')">Todos</span><span onclick="deselTodos('Suc')">Ninguno</span></div>
      <div id="itemsSuc"></div>
    </div>
  </div>

  <div class="dd-wrap" id="wrapVen">
    <button class="dd-btn" id="btnVen" onclick="toggleDD('Ven')" disabled>
      <span id="lblVen">Todos los vendedores</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list" id="listVen">
      <div class="dd-search"><input type="text" id="searchVen" placeholder="Buscar vendedor..." oninput="filtrarDD('Ven')"></div>
      <div class="dd-actions"><span onclick="selTodos('Ven')">Todos</span><span onclick="deselTodos('Ven')">Ninguno</span></div>
      <div id="itemsVen"></div>
    </div>
  </div>

  <div class="dd-wrap" id="wrapMes">
    <button class="dd-btn" id="btnMes" onclick="toggleDD('Mes')" disabled>
      <span id="lblMes">Todos los meses</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list" id="listMes">
      <div class="dd-search"><input type="text" id="searchMes" placeholder="Buscar mes..." oninput="filtrarDD('Mes')"></div>
      <div class="dd-actions"><span onclick="selTodos('Mes')">Todos</span><span onclick="deselTodos('Mes')">Ninguno</span></div>
      <div id="itemsMes"></div>
    </div>
  </div>

  <button class="btn-accion" onclick="cargarDesdeCache()">&#x21BB; Recargar Cache</button>
  <label class="btn-accion btn-excel" for="fileExcel" style="display:inline-block;cursor:pointer;">&#x1F4C2; Actualizar desde Excel</label>
  <input type="file" id="fileExcel" accept=".xlsx" style="display:none" onchange="reprocesarExcel(this)">
</div>

<div class="toolbar-prov">
  <div class="dd-wrap dd-wrap-ancho" id="wrapProv">
    <button class="dd-btn dd-btn-ancho" id="btnProv" onclick="toggleDD('Prov')" disabled>
      <span id="lblProv">Todos los proveedores</span><span class="arrow">&#9660;</span>
    </button>
    <div class="dd-list dd-list-ancho" id="listProv">
      <div class="dd-search"><input type="text" id="searchProv" placeholder="Buscar proveedor..."></div>
      <div id="itemsProv"></div>
    </div>
  </div>
</div>

<div class="kpi-row" id="kpiRow" style="display:none;">
  <div class="kpi">
    <div class="kpi-icono">&#128203;</div>
    <div class="kpi-texto"><div class="kpi-label">Total Registros</div><div class="kpi-valor" id="kpiRegistros">-</div></div>
  </div>
  <div class="kpi verde">
    <div class="kpi-icono">&#128230;</div>
    <div class="kpi-texto"><div class="kpi-label">Total Unidades</div><div class="kpi-valor" id="kpiUnidades">-</div></div>
  </div>
  <div class="kpi naranja">
    <div class="kpi-icono">&#8617;</div>
    <div class="kpi-texto"><div class="kpi-label">Devoluciones</div><div class="kpi-valor" id="kpiDevoluciones">-</div></div>
  </div>
  <div class="kpi">
    <div class="kpi-icono">&#128176;</div>
    <div class="kpi-texto"><div class="kpi-label">Ventas Netas</div><div class="kpi-valor" id="kpiVentas">-</div></div>
  </div>
</div>

<div class="periodo" id="periodo"></div>
<div id="contenido"><div class="loading"><div class="spinner"></div><br>Cargando datos de ventas...</div></div>

<script>
let todosLosDatos = [];
let proveedoresList = [];
let mapaNombresProv = {};
const sel = { Suc: new Set(), Ven: new Set(), Mes: new Set() };
const todos = { Suc: [], Ven: [], Mes: [] };
const labels = { Suc: ["Todas las sucursales","sucursales"], Prov: ["Todos los proveedores","proveedores"], Ven: ["Todos los vendedores","vendedores"], Mes: ["Todos los meses","meses"] };

function toggleDD(key) {
  ["Suc","Ven","Mes"].forEach(k => {
    if (k !== key) {
      document.getElementById("list"+k).classList.remove("open");
      document.getElementById("btn"+k).classList.remove("active");
    }
  });
  document.getElementById("list"+key).classList.toggle("open");
  document.getElementById("btn"+key).classList.toggle("active");
}

document.addEventListener("click", function(e) {
  ["Suc","Ven","Mes"].forEach(k => {
    if (!document.getElementById("wrap"+k).contains(e.target)) {
      document.getElementById("list"+k).classList.remove("open");
      document.getElementById("btn"+k).classList.remove("active");
    }
  });
});

function poblarDD(key, items) {
  todos[key] = [...items];
  sel[key] = new Set(items);
  actualizarLabel(key);
  renderItems(key);
}

function renderItems(key) {
  const q = (document.getElementById("search"+key).value || "").toLowerCase();
  const lista = todos[key].filter(v => v.toLowerCase().includes(q));
  const cont = document.getElementById("items"+key);
  cont.innerHTML = "";
  lista.forEach(v => {
    const div = document.createElement("div");
    div.className = "dd-item";
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = sel[key].has(v);
    const span = document.createElement("span");
    span.textContent = v;
    div.appendChild(cb);
    div.appendChild(span);
    // Solo el checkbox maneja el cambio, el div solo redirige al checkbox
    cb.addEventListener("change", function() {
      if (this.checked) sel[key].add(v);
      else              sel[key].delete(v);
      actualizarLabel(key);
      filtrar();
    });
    div.addEventListener("click", function(e) {
      if (e.target !== cb) cb.click();
    });
    cont.appendChild(div);
  });
}

function filtrarDD(key) {
  renderItems(key);
}


function selTodos(key) {
  sel[key] = new Set(todos[key]);
  actualizarLabel(key);
  if (key === "Prov") renderProv(); else renderItems(key);
  filtrar();
}

function deselTodos(key) {
  sel[key] = new Set();
  actualizarLabel(key);
  if (key === "Prov") renderProv(); else renderItems(key);
  filtrar();
}

function actualizarLabel(key) {
  const total = todos[key].length;
  const n     = sel[key].size;
  const lbl   = document.getElementById("lbl"+key);
  if (key === "Prov") {
    if (n === total) lbl.textContent = "Todos los proveedores";
    else if (n === 1) {
      const c = [...sel[key]][0];
      lbl.textContent = mapaNombresProv[c] ? (c + " - " + mapaNombresProv[c]) : c;
    } else lbl.textContent = n + " proveedores";
    return;
  }
  if (n === 0)        lbl.textContent = "Sin " + labels[key][1];
  else if (n===total) lbl.textContent = labels[key][0];
  else if (n === 1)   lbl.textContent = [...sel[key]][0];
  else                lbl.textContent = n + " " + labels[key][1];
}

async function cargarDesdeCache() {
  document.getElementById("contenido").innerHTML = "<div class='loading'><div class='spinner'></div><br>Cargando datos...</div>";
  const res  = await fetch("/api/ventas/cargar", { method: "POST" });
  const data = await res.json();
  if (!data.ok) {
    document.getElementById("contenido").innerHTML = "<div class='estado-area'><p style='color:#C00000'>Error: " + data.error + "</p></div>";
    return;
  }
  todosLosDatos = data.registros;
  await poblarFiltros(todosLosDatos);
  filtrar();
  if (data.periodo) document.getElementById("periodo").textContent = "Periodo: " + data.periodo.desde + " a " + data.periodo.hasta;
  document.getElementById("searchInput").disabled = false;
  ["Suc","Prov","Ven","Mes"].forEach(k => document.getElementById("btn"+k).disabled = false);
  document.getElementById("kpiRow").style.display = "grid";
}

async function reprocesarExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = "";
  document.getElementById("contenido").innerHTML = "<div class='loading'><div class='spinner'></div><br>Procesando Excel... puede tardar unos segundos</div>";
  document.getElementById("kpiRow").style.display = "none";
  document.getElementById("periodo").textContent = "";
  const formData = new FormData();
  formData.append("archivo", file);
  const res  = await fetch("/api/ventas/reprocesar", { method: "POST", body: formData });
  const data = await res.json();
  if (!data.ok) {
    document.getElementById("contenido").innerHTML = "<div class='estado-area'><p style='color:#C00000'>Error: " + data.error + "</p></div>";
    return;
  }
  await cargarDesdeCache();
}

async function poblarFiltros(datos) {
  const sucursales = [...new Set(datos.map(d => d.sucursal))].sort();
  const vendedores = [...new Set(datos.map(d => d.vendedor))].sort();
  const meses      = [...new Set(datos.map(d => d.anio_mes))].sort();
  const coprovs    = [...new Set(datos.map(d => d.co_prov).filter(Boolean))].sort();

  // Vendedores y meses: todos activos por defecto
  todos["Ven"] = vendedores;
  sel["Ven"] = new Set(vendedores.filter(v => {
    const val = localStorage.getItem("ven_activo_" + v);
    return val === null ? true : val === "1";
  }));
  actualizarLabel("Ven");
  renderItems("Ven");

  // Poblar Mes respetando el periodo guardado en localStorage
  const periodoGuardado = localStorage.getItem("periodo_ventas");
  todos["Mes"] = meses;
  const labelsMes = { "3": "Ultimos 3 meses", "6": "Ultimos 6 meses", "12": "Ultimos 12 meses", "0": "Todo el historico" };
  if (periodoGuardado !== null) {
    const mesesInt = parseInt(periodoGuardado);
    if (mesesInt > 0) {
      // Tomar meses desde el ultimo disponible en cache, no desde la fecha actual
      const mesesOrdenados = [...meses].sort();
      const corte = mesesOrdenados.length >= mesesInt
        ? mesesOrdenados[mesesOrdenados.length - mesesInt]
        : (mesesOrdenados[0] || "2000-01");
      sel["Mes"] = new Set(meses.filter(m => m >= corte));
    } else {
      sel["Mes"] = new Set(meses);
    }
    // Mostrar label del periodo en vez del conteo
    const lblMes = document.getElementById("lblMes");
    if (lblMes && labelsMes[periodoGuardado]) lblMes.textContent = labelsMes[periodoGuardado];
    else actualizarLabel("Mes");
  } else {
    sel["Mes"] = new Set(meses);
    actualizarLabel("Mes");
  }
  renderItems("Mes");

  // Sucursales: leer estado desde localStorage
  todos["Suc"] = sucursales;
  sel["Suc"] = new Set(sucursales.filter(s => {
    const v = localStorage.getItem("suc_activa_" + s);
    return v === null ? true : v === "1";
  }));
  actualizarLabel("Suc");
  renderItems("Suc");

  // Proveedores: usar SIEMPRE los co_prov que existen en el cache de ventas
  try {
    const res = await fetch("/api/proveedores/lista");
    proveedoresList = await res.json();
  } catch(e) { proveedoresList = []; }

  mapaNombresProv = {};
  proveedoresList.forEach(p => { mapaNombresProv[p.codigo] = p.nombre; });

  const codigos_prov = coprovs.slice().sort();

  todos["Prov"] = codigos_prov;
  sel["Prov"] = new Set(codigos_prov.filter(c => {
    const v = localStorage.getItem("prov_activo_" + c);
    return v === "1";
  }));
  actualizarLabel("Prov");
  renderProv();

  document.getElementById("searchProv").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    document.getElementById("itemsProv").querySelectorAll(".dd-item").forEach(el => {
      el.style.display = el.querySelector("span").textContent.toLowerCase().includes(q) ? "" : "none";
    });
  });
}

function renderProv() {
  const cont = document.getElementById("itemsProv");
  cont.innerHTML = "";

  // Opcion "Todos los proveedores"
  const divTodos = document.createElement("div");
  divTodos.className = "dd-item dd-item-single" + (sel["Prov"].size === todos["Prov"].length ? " selected" : "");
  divTodos.textContent = "Todos los proveedores";
  divTodos.addEventListener("click", function() {
    sel["Prov"] = new Set(todos["Prov"]);
    actualizarLabel("Prov");
    renderProv();
    filtrar();
    document.getElementById("listProv").classList.remove("open");
    document.getElementById("btnProv").classList.remove("active");
  });
  cont.appendChild(divTodos);

  todos["Prov"].forEach(c => {
    const nombre = mapaNombresProv[c] ? (c + " - " + mapaNombresProv[c]) : c;
    const div = document.createElement("div");
    const isSelected = sel["Prov"].size === 1 && sel["Prov"].has(c);
    div.className = "dd-item dd-item-single" + (isSelected ? " selected" : "");
    div.textContent = nombre;
    div.addEventListener("click", function() {
      sel["Prov"] = new Set([c]);
      actualizarLabel("Prov");
      renderProv();
      filtrar();
      document.getElementById("listProv").classList.remove("open");
      document.getElementById("btnProv").classList.remove("active");
    });
    cont.appendChild(div);
  });
}

function actualizarKPIs(datos, periodo) {
  document.getElementById("kpiRegistros").textContent    = datos.length.toLocaleString();
  document.getElementById("kpiUnidades").textContent     = datos.reduce((a,d) => a + d.unidades_vendidas, 0).toLocaleString();
  document.getElementById("kpiDevoluciones").textContent = datos.reduce((a,d) => a + d.devoluciones, 0).toLocaleString();
  document.getElementById("kpiVentas").textContent       = datos.reduce((a,d) => a + d.ventas_netas, 0).toLocaleString();
  if (periodo) document.getElementById("periodo").textContent = "Periodo: " + periodo.desde + " a " + periodo.hasta;
}

let POR_PAGINA = 100;
let datosFiltrados = [];
let paginaActual = 1;
let sortCol = "";
let sortAsc = true;
let colResaltada = "";
let filaResaltada = -1;

function sortByVentas(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  colResaltada = col;
  paginaActual = 1;
  renderTabla();
}
function sortIconVentas(col) {
  if (sortCol !== col) return " &#8597;";
  return sortAsc ? " &#8593;" : " &#8595;";
}
function toggleFilaVentas(idx) {
  filaResaltada = (filaResaltada === idx) ? -1 : idx;
  renderTabla();
}

function filtrar() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  datosFiltrados = todosLosDatos.filter(d =>
    (d.sku + d.descripcion).toLowerCase().includes(q) &&
    sel.Suc.has(d.sucursal) &&
    sel.Prov.has(d.co_prov) &&
    sel.Ven.has(d.vendedor) &&
    sel.Mes.has(d.anio_mes)
  );
  paginaActual = 1;
  actualizarKPIs(datosFiltrados, null);
  renderTabla();
}

function renderTabla() {
  const contenido = document.getElementById("contenido");
  if (!datosFiltrados.length) {
    contenido.innerHTML = "<div class='estado-area'><p>No hay registros con los filtros aplicados</p></div>";
    return;
  }

  if (sortCol) {
    datosFiltrados.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") va = va.toLowerCase();
      if (typeof vb === "string") vb = vb.toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  const totalPags = Math.ceil(datosFiltrados.length / POR_PAGINA);
  if (paginaActual > totalPags) paginaActual = totalPags;
  const inicio = (paginaActual - 1) * POR_PAGINA;
  const pagina = datosFiltrados.slice(inicio, inicio + POR_PAGINA);

  const colCls = function(col) { return colResaltada === col ? " col-resaltada" : ""; };

  let filas = pagina.map((d, i) => {
    const idxGlobal = inicio + i;
    const filaCls = filaResaltada === idxGlobal ? " fila-resaltada" : "";
    return "<tr class='" + filaCls.trim() + "' onclick=\"toggleFilaVentas(" + idxGlobal + ")\" style='cursor:pointer'>" +
    "<td class='cod" + colCls("sku") + "'>" + d.sku + "</td>" +
    "<td class='" + colCls("descripcion").trim() + "'>" + d.descripcion + "</td>" +
    "<td class='" + colCls("sucursal").trim() + "'><span class='suc-badge'>" + d.sucursal + "</span></td>" +
    "<td class='" + colCls("vendedor").trim() + "'>" + (d.vendedor || "-") + "</td>" +
    "<td class='" + colCls("anio_mes").trim() + "'><span class='mes-badge'>" + d.anio_mes + "</span></td>" +
    "<td class='right " + (d.devoluciones > 0 ? "dev " : "") + colCls("unidades_vendidas").trim() + "'>" + d.unidades_vendidas.toLocaleString() + "</td>" +
    "<td class='right " + (d.devoluciones > 0 ? "dev " : "") + colCls("devoluciones").trim() + "'>" + d.devoluciones.toLocaleString() + "</td>" +
    "<td class='right " + colCls("ventas_netas").trim() + "'>" + d.ventas_netas.toLocaleString() + "</td>" +
    "</tr>";
  }).join("");

  // Selector de pagina
  let opciones = "";
  for (let i = 1; i <= totalPags; i++) {
    opciones += "<option value='" + i + "'" + (i === paginaActual ? " selected" : "") + ">Pag " + i + " de " + totalPags + "</option>";
  }
  const selectorTam =
    "<select class='pag-select' onchange='cambiarTamPag(this.value)' style='margin-left:8px;'>" +
    [25,50,100].map(n => "<option value='" + n + "'" + (n===POR_PAGINA?" selected":"") + ">" + n + " / pag</option>").join("") +
    "</select>";
  const paginador =
    "<div class='paginador'>" +
    "<span class='pag-info'>" + datosFiltrados.length.toLocaleString() + " registros &nbsp;|&nbsp; mostrando " + (inicio + 1) + " - " + Math.min(inicio + POR_PAGINA, datosFiltrados.length) + "</span>" +
    "<div style='display:flex;gap:8px;align-items:center;'>" +
    selectorTam +
    "<select class='pag-select' onchange='irPagina(this.value)'>" + opciones + "</select>" +
    "</div>" +
    "</div>";

  const encCols = [
    ["sku","SKU",""], ["descripcion","Descripcion",""], ["sucursal","Sucursal",""],
    ["vendedor","Vendedor",""], ["anio_mes","A\u00d1O-MES","min-width:100px"],
    ["unidades_vendidas","Unidades Vendidas","right"], ["devoluciones","Devoluciones","right"],
    ["ventas_netas","Ventas Netas","right"]
  ];
  let thHtml = "";
  encCols.forEach(function(c) {
    const col = c[0], label = c[1], extra = c[2];
    const claseRight = extra === "right" ? " right" : "";
    const claseResaltada = colCls(col);
    const claseAttr = (claseRight || claseResaltada) ? " class='" + (claseRight + claseResaltada).trim() + "'" : "";
    const styleAttr = extra && extra !== "right" ? " style='" + extra + "'" : "";
    thHtml += "<th" + claseAttr + styleAttr + " onclick='sortByVentas(&quot;" + col + "&quot;)'>" + label + sortIconVentas(col) + "</th>";
  });

  contenido.innerHTML =
    paginador +
    "<table><thead><tr>" + thHtml + "</tr></thead><tbody>" + filas + "</tbody></table>" +
    paginador;
}

function cambiarTamPag(n) {
  POR_PAGINA = parseInt(n);
  paginaActual = 1;
  renderTabla();
}

function irPagina(p) {
  paginaActual = parseInt(p);
  renderTabla();
  document.getElementById("contenido").scrollIntoView({ behavior: "smooth", block: "start" });
}

window.onload = cargarDesdeCache;
</script>
{% endblock %}
